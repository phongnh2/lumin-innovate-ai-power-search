version: '3.7'
volumes:
  kratos-postgres:

services:
  kratos-migrate:
    depends_on:
      - kratos-postgres
    build:
      context: ./
      dockerfile: ./kratos/Dockerfile
    command: -c /etc/config/kratos/kratos.yml migrate sql -e --yes
    restart: on-failure
    pull_policy: build
    env_file:
      - .env
    networks:
      - intranet

  kratos:
    depends_on:
      - kratos-migrate
    build:
      context: ./
      dockerfile: ./kratos/Dockerfile
    command: serve -c /etc/config/kratos/kratos.yml --watch-courier
    ports:
      - 4433:4433 # public
      - 4434:4434 # admin
    restart: unless-stopped
    pull_policy: build
    env_file:
      - .env
    environment:
      - LOG_LEVEL=trace
    networks:
      - intranet

  mailslurper:
    image: oryd/mailslurper:latest-smtps
    ports:
      - 4436:4436
      - 4437:4437
    networks:
      - intranet

  kratos-postgres:
    image: postgres:14
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=kratos
      - POSTGRES_DB=kratos
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - kratos-postgres:/var/lib/postgresql/data
    networks:
      - intranet
  elasticsearch:
    environment:
      - 'discovery.type=single-node'
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    image: docker.elastic.co/elasticsearch/elasticsearch:7.8.0
    ports:
      - 9200:9200
    networks:
      - intranet

networks:
  intranet: null
