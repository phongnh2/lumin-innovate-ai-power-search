/user/get-current-user:
  get:
    summary: Get current user
    description: Returns information about the currently authenticated user
    tags:
      - User
    security:
      - BearerAuth: []
    responses:
      200:
        description: Current user information
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurrentUserResponse'
      401:
        description: Unauthorized

/user/change-name-mobile:
  patch:
    summary: Change user name for mobile clients
    description: Updates the user's name in the system for mobile application users
    tags:
      - User
    security:
      - MobileAuth: []
    parameters:
      - $ref: '#/components/parameters/RefreshTokenHeader'
      - $ref: '#/components/parameters/MobileHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ChangeNameDTO'
    responses:
      200:
        description: Name updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 'Change name success'
      400:
        description: Invalid request
      401:
        description: Unauthorized

/user/update-identityId:
  post:
    summary: Update user identity ID
    description: Updates the user's identity ID in the system by syncing the identity ID with the user's email
    tags:
      - User
    security:
      - BearerAuth: []
    responses:
      200:
        description: Identity ID successfully updated
      401:
        description: Unauthorized

/user/confirm-link-account:
  post:
    summary: Confirm linking of accounts
    description: Confirms the linking of user accounts and syncs account settings with the login service
    tags:
      - User
    security:
      - BearerAuth: []
    responses:
      200:
        description: Account linking confirmed successfully
      401:
        description: Unauthorized

/user/remove-avatar-mobile:
  patch:
    summary: Remove user avatar from mobile
    description: Removes the current user's avatar image when accessed from mobile applications
    tags:
      - User
    security:
      - MobileAuth: []
    parameters:
      - $ref: '#/components/parameters/RefreshTokenHeader'
      - $ref: '#/components/parameters/MobileHeader'
    responses:
      200:
        description: Avatar successfully removed
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 'Remove user avatar'
      401:
        description: Unauthorized
      500:
        description: Internal server error

/user/upload-avatar-mobile:
  patch:
    summary: Upload user avatar from mobile
    description: Uploads a new avatar image for the user when accessed from mobile applications
    tags:
      - User
    security:
      - MobileAuth: []
    parameters:
      - $ref: '#/components/parameters/RefreshTokenHeader'
      - $ref: '#/components/parameters/MobileHeader'
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              avatar:
                type: string
                format: binary
                description: The avatar image file to upload
    responses:
      200:
        description: Avatar successfully uploaded
        content:
          application/json:
            schema:
              type: object
              properties:
                remotePath:
                  type: string
                  description: The remote path where the avatar is stored
                  example: 'profiles/avatar-123456.jpg'
      400:
        description: Bad Request - Invalid file type or format
      401:
        description: Unauthorized
      422:
        description: Unprocessable Entity
      500:
        description: Internal server error

/user/upload-avatar:
  patch:
    summary: Upload user avatar
    description: Uploads a new avatar image for the authenticated user
    tags:
      - User
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              avatar:
                type: string
                format: binary
                description: The avatar image file to upload
    responses:
      200:
        description: Avatar successfully uploaded
        content:
          application/json:
            schema:
              type: object
              properties:
                remotePath:
                  type: string
                  description: The remote path where the avatar is stored
                  example: 'profiles/avatar-123456.jpg'
      400:
        description: Bad Request
      401:
        description: Unauthorized
      422:
        description: Unprocessable Entity
      500:
        description: Internal server error

/user/remove-avatar:
  patch:
    summary: Remove user avatar
    description: Removes the current avatar image for the authenticated user
    tags:
      - User
    security:
      - BearerAuth: []
    responses:
      204:
        description: Avatar successfully removed
      401:
        description: Unauthorized
      500:
        description: Internal server error

/user/get-organization-team-owner:
  get:
    summary: Get organization and team ownership information
    description: Retrieves information about organizations and teams where the authenticated user is an owner
    tags:
      - User
    security:
      - BearerAuth: []
    responses:
      200:
        description: Successfully retrieved organization and team ownership information
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamAndOrganizationResponse'
      400:
        description: Bad Request
      401:
        description: Unauthorized
      500:
        description: Internal server error

/user/delete-account:
  post:
    summary: Delete user account
    description: Permanently deletes the authenticated user's account
    tags:
      - User
    security:
      - BearerAuth: []
    responses:
      200:
        description: Account successfully deleted
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurrentUserResponse'
      400:
        description: Bad Request
      401:
        description: Unauthorized
      500:
        description: Internal server error
