syntax = "proto3";
import "google/protobuf/empty.proto";
import "integration/common.proto";

package lumin.contract.v1;

service ContractService {
  rpc SendSignatureRequest (SendSignatureRequestMessage) returns (SendSignatureRequestResponse) {}
  rpc SendSignatureRequestV2 (SendSignatureRequestMessageV2) returns (SendSignatureRequestResponse) {}
  rpc GetSignatureRequest (GetSignatureRequestMessage) returns (GetSignatureRequestResponse) {}
  rpc GetRemoteFileWasApproved (GetRemoteFileWasApprovedRequest) returns (GetRemoteFileWasApprovedResponse) {}
  rpc CancelSignatureRequest(CancelSignatureRequestMessage) returns (CancelSignatureRequestResponse) {}
  rpc SendReminderToEmails(SendReminderToEmailMessage) returns (SendReminderToEmailResponse) {}
  rpc GetRemoteFileWasApprovedByType(GetRemoteFileWasApprovedByTypeMessage) returns (GetRemoteFileWasApprovedByTypeResponse) {}
  rpc UpdateDueDateSignatureRequest(UpdateDueDateSignatureRequestMessage) returns (google.protobuf.Empty) {}
}

service TemplateService {
  rpc SendSignatureRequestWithTemplate(SendSignatureRequestWithTemplateMessage) returns (SendSignatureRequestResponse) {}
  rpc GenerateDocument(GenerateDocumentMessage) returns (GenerateDocumentResponse) {}
  rpc GetTemplates(GetTemplatesMessage) returns (GetTemplatesResponse) {}
  rpc GetTemplateDetail(GetTemplateDetailMessage) returns (GetTemplateDetailResponse) {}
  rpc SendSignatureRequestWithAgTemplate(SendSignatureRequestWithAgTemplateMessage) returns (SendSignatureRequestResponse) {}
}

enum ContractType {
  OTHERS = 0;
}

enum FormBuilderType {
  KEEP_DATA = 0;
}

message ContractInputMessage {
  string name = 1;
  int64 due_time_expired = 2;
  optional ContractType type = 3;
  optional FormBuilderType form_builder_type = 4;
  bool use_text_tags = 5;
  lumin.integration.SigningType signing_type =6;

}

message AssignUserMessage {
  string name = 1;
  string email = 2;
  int32 group = 3;
  optional VerificationMessage verification = 4;
}

message ViewerMessage {
  string name = 1;
  string email = 2;
}

message VerificationMessage {
  string method = 1;
  VerificationPayloadMessage payload = 2;
}

message VerificationPayloadMessage {
  string doc_type = 1;
  repeated string claims = 2;
}

message SignerResponseMessage{
  string id = 1;
  string email = 2;
  string name = 3;
  string status = 4;
  bool is_approved = 5;
  int32 group = 6;
}


message OwnerInfoMessage {
  string owner_id = 1;
  string custom_sender_subject_name = 2;
  string custom_sender_title = 3;
  string custom_sender_email = 4;
}

message SendSignatureRequestMessage {
  string file_remote_id = 1;
  ContractInputMessage contract = 2;
  repeated AssignUserMessage signer_list = 3;
  repeated AssignUserMessage viewer_list = 4;
  OwnerInfoMessage owner_info = 5;
  optional string workspace_id = 6;
}

message FileRemoteInfo {
  string remoteId = 1;
  int32 index = 2;
}

message SendSignatureRequestMessageV2 {
  repeated FileRemoteInfo files = 1;
  ContractInputMessage contract = 2;
  repeated AssignUserMessage signer_list = 3;
  repeated AssignUserMessage viewer_list = 4;
  OwnerInfoMessage owner_info = 5;
  optional string workspace_id = 6;
}

message ContractMessageResponse {
  string contract_id = 1;
  string name = 2;
  int64 created_at = 3;
  int64 updated_at = 4;
  int64 due_time_expired = 5;
  string thumb_remote_id = 6;
  ContractType type = 7;
  string mime_type = 8;
  FormBuilderType form_builder_type = 9;
  string detail_url = 10;
  repeated SignerResponseMessage signers = 11;
  string status = 12;
  string reason = 13;
  lumin.integration.SigningType signing_type=14;
}

message SignatureRequestMessage{
  string contract_id = 1;
  string status = 2;
  int64 created_at = 3;
  int64 updated_at = 4;

}

message SendSignatureRequestResponse {
  SignatureRequestMessage data = 1;
  string message = 2;
  int32 status_code = 3;
}

message CancelSignatureRequestMessage {
  string contract_id = 1;
  string owner_id = 2;
}

message SignerRemindStatus {
  string email = 1;
  string signer_status = 2;
  string email_status = 3;

}

message SendReminderToEmailResponse {
  string contract_id = 1;
  repeated SignerRemindStatus result = 2;
}

message SendReminderToEmailMessage {
  string contract_id = 1;
  string owner_id = 2;
  repeated string emails = 3;
}


message CancelSignatureRequestResponse {
  string contract_id = 1;
  string status = 2;
}

message GetSignatureRequestMessage {
  string contract_id = 1;
  string owner_id = 2;
}

message GetRemoteFileWasApprovedRequest {
  string contract_id = 1;
  string owner_id = 2;
}

message GetRemoteFileWasApprovedResponse {
  string remote_id = 1;
  string file_name = 2;
  string bucket_name = 3;
}

message GetSignatureRequestResponse {
  ContractMessageResponse data = 1;
  string message = 2;
  int32 status_code = 3;
}

message TextTagResponse {
  string name = 1;
  string type = 2;
  bool is_required = 3;
}

message FormFieldResponse {
  string name = 1;
  string type = 2;
  bool is_required = 3;
  string assigned_role = 4;
}

message GetRemoteFileWasApprovedByTypeMessage {
  string contract_id = 1;
  string owner_id = 2;
  string type = 3;
}

message GetRemoteFileWasApprovedByTypeResponse {
  string remote_id = 1;
  string file_name = 2;
  string bucket_name = 3;
}

message UpdateDueDateSignatureRequestMessage {
  string owner_id = 1;
  string contract_id = 2;
  int64 due_time_expired = 3;
}

/**
  Template
*/

message TemplateContractInputMessage {
  string name = 1;
  int64 due_time_expired = 2;
}

message TemplateSigner {
  string name = 1;
  string email = 2;
  string signer_role = 3;
  optional VerificationMessage verification = 4;
}

message GenerateDocumentFormFieldMessage {
  string name = 1;
  string value = 2;
}

message TextMergeTagMessage {
  string name = 1;
  string value = 2;
}

message FieldMergeMessage {
  string name = 1;
  string value = 2;
}

message SendSignatureRequestWithTemplateMessage {
  string template_id = 1;
  TemplateContractInputMessage contract = 2;
  repeated TemplateSigner signer_list = 3;
  repeated ViewerMessage viewer_list = 4;
  OwnerInfoMessage owner_info = 5;
  repeated TextMergeTagMessage tags = 6;
  optional string workspace_id = 7;
  repeated FieldMergeMessage fields = 8;
}

message GenerateDocumentMessage {
  string template_id = 1;
  string owner_id = 2;
  repeated TextMergeTagMessage tags = 3;
  repeated GenerateDocumentFormFieldMessage fields = 4;
}

message GenerateDocumentResponse {
  string remote_id = 1;
  string bucket_name = 2;
  string template_id = 3;
  string preview_url = 4;
  string signed_url = 5;
  int64 expires_at = 6;
}

message GetTemplatesMessage {
  string owner_id = 1;
}

message GetTemplatesResponse {
  repeated lumin.integration.TemplateInfo data = 1;
  int32 total = 2;
}

message GetTemplateDetailMessage {
  string template_id = 1;
  string owner_id = 2;
}

message GetTemplateDetailResponse {
  lumin.integration.Template data = 1;
}

message TemplateSettingMessage {
  string signing_type = 1;
  repeated lumin.integration.TemplateSignerRole signers = 2;
}

message SendSignatureRequestWithAgTemplateMessage {
  string remote_id = 1;
  TemplateContractInputMessage contract = 2;
  repeated TemplateSigner signer_list = 3;
  repeated ViewerMessage viewer_list = 4;
  OwnerInfoMessage owner_info = 5;
  optional string workspace_id = 7;
  repeated FieldMergeMessage fields = 8;
  TemplateSettingMessage settings = 9;
}