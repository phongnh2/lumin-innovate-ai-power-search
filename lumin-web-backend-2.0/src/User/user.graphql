  DOCUMENT
  ORGANIZATION
  ORGANIZATION_TEAM
  ORGANIZATION_CREATION
  ORGANIZATION_TEAM_CREATION
  ORGANIZATION_GRANT_BILLING
}

enum LoginService {
  GOOGLE
  DROPBOX
  APPLE
  EMAIL_PASSWORD
  MICROSOFT
  XERO
}

enum RatingModalStatus {
  NEVER_INTERACT
  OPEN
  HIDE
}

enum UserMetadataEnums {
  hasShownTourGuide
  hasShownAutoSyncModal
  hasShownEditFileOfflinePopover
  hasShownContentEditPopover
  hasShownAutoSyncDefault
  introduceNewLayout
  isHiddenSuggestedOrganization
  isUsingNewLayout
  isUsingNewInAppLayout
  introduceNewInAppLayout
  hasShowOnboardingFlowFromOpenGoogle
  isAgreementTourGuideVisible
  hasShownEditInAgreementGenModal
  hasShownSharePrompt
  hasClosedQuickSearchGuideline
