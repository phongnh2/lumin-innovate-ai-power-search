enum TemplateOwnerType {
  PERSONAL
  ORGANIZATION
  ORGANIZATION_TEAM
  ORGANIZATION_PERSONAL
}

enum CounterType {
  VIEW
  DOWNLOAD
}

type Template {
  _id: ID!
  name: String
  size: Int
  remoteId: String
  thumbnail: String
  ownerId: ID
  description: String
  createdAt: Date
  counter: TemplateCounter
  ownerType: String
  # ResolveProperties
  signedUrl: String
  belongsTo: BelongsTo
  ownerName: String
  permissions: TemplatePermissions
}

type TemplatePermissions {
  canEdit: Boolean
  canDelete: Boolean
}

type TemplateLocation {
  _id: String
  name: String
}

type TemplateCounter {
  view: Int
  download: Int
}

input GetTemplatesInput {
  searchKey: String
  limit: Int!
  offset: Int!
}

input UploadPersonalTemplateInput {
  name: String! @Length(min: 1, max: 255)
  description: String! @Length(min: 1, max: 1000)
}

input UploadTeamTemplateInput {
  name: String! @Length(min: 1, max: 255)
  description: String! @Length(min: 1, max: 1000)
  teamId: ID! @MongoId
}

input UploadOrganizationTemplateInput {
  name: String! @Length(min: 1, max: 255)
  description: String! @Length(min: 1, max: 1000)
  orgId: ID! @MongoId
  isNotify: Boolean
}

input UpdateTemplateCounterInput {
  templateId: ID!
  type: CounterType!,
  number: Int! @Range(min: 1, max: 1)
}

type TemplateEdge {
  node: Template
  cursor: String
}

type DeleteTemplatePayload {
  message: String!
  statusCode: Int!
  type: String
}

input DeleteTemplateInput {
  templateId: ID! @MongoId
  isNotify: Boolean
}

input EditTemplateInput {
  templateId: ID! @MongoId
  name: String! @NotIncludes(patterns: ["html", "url"]) @Length(min: 1, max: 255)
  description: String! @Length(min: 1, max: 1000)
  isRemoveThumbnail: Boolean
}

type GetTemplatesPayload {
  totalItem: Int!
  edges: [TemplateEdge]!
  pageInfo: PageInfo!
}

type Query {
  getPersonalTemplates(pagingOption: GetTemplatesInput!): GetTemplatesPayload
  getTemplateById(templateId: ID! @MongoId(key: "templateId"), increaseView: Boolean): Template
  checkReachDailyTemplateUploadLimit(uploaderId: ID! @MongoId(key: "uploaderId"), refId: ID! @MongoId(key: "refId")): Boolean
}
type Mutation {
  uploadPersonalTemplate(input: UploadPersonalTemplateInput!, files: [Upload]!): Template
  createDocumentFromTemplate(templateId: ID! @MongoId(key: "templateId"), notify: Boolean): Document
  updateTemplateCounter(input: UpdateTemplateCounterInput!): Template
  deleteTemplate(input: DeleteTemplateInput!): DeleteTemplatePayload
  editTemplate(input: EditTemplateInput!, file: Upload): Template
}