type Query {
  getDocumentById(documentId: ID! @MongoId(key: "documentId")): Document
  getDocuments(input: GetPersonalWorkspaceDocumentsInput!): GetDocumentPayload
  document(documentId: ID! @MongoId(key: "documentId"), usePwa: Boolean): Document
  getDocumentByRemoteId(
    documentRemoteId: ID!
    clientId: ID @MongoId(key: "clientId")
  ): GetDocumentByRemoteIdPayload
  getFormList(input: GetDocumentFormInput): GetFormListPayload
  getRequestAccessDocsList(
    input: DocumentRequestAccessInput!
  ): RequestAccessDocsListPayload
  getPDFInfo(documentId: ID! @MongoId(key: "documentId")): PDFInfoPayload
  getShareInviteByEmailList(documentId: ID! @MongoId(key: "documentId"), searchKey: String): GetShareInviteByEmailListPayload
  getMentionList(input: MentionListInput!): GetMentionListPayload
  getMembersByDocumentId(input: GetMembersByDocumentIdInput!): MemberWithCursorPaginationPayload
  getManipulationDocument(input: ManipulationDocumentInput): [ManipulationDocumentPayload]
  getSharedDocuments(input: DocumentQueryInput!): GetDocumentPayload
  downloadDocument(documentId: ID! @MongoId(key: "documentId")): Document
  getRequestAccessDocById(documentId: ID! @MongoId(key: "documentId") requesterId: ID! @MongoId(key: "requesterId")): UserPermission
  getDocStackInfo(documentId: ID! @MongoId(key: "documentId")): GetDocStackInfoPayload
  checkThirdPartyStorage(remoteIds: [ID!]! @Array(key: "remoteIds", min: 1, max: 20, unique: true)): [CheckThirdPartyStoragePayload]
  getAnnotations(documentId: ID! @MongoId(key: "documentId")): [Annotations]
  getPremiumToolInfoAvailableForUser: PremiumToolsInfo
  getDocumentOriginalFileUrl(documentId: ID! @MongoId(key: "documentId")): String
  getPresignedUrlForDocumentOriginalVersion(input: GetPresignedUrlForUploadDocInput!): GetPresignedUrlForUploadDocPayload
  getPresignedUrlForDocumentImage(input: PresignedUrlForImageInput!): PresignedUrlForImagePayload
  getCreatedSignaturePresignedUrl(fileType: String!): PresignedUrlForSignaturePayload
  getPresignedUrlForTemporaryDrive(documentId: ID! @MongoId(key: "documentId")): GetPresignedUrlForTemporaryDocumentPayload
  getSignedUrlForOCR(documentId: ID! @MongoId(key: "documentId"), totalParts: Int! @Range(key: "totalParts", min: 1, max: 10)): GetPresignedUrlForOcrPayload
  getTemporaryDocumentPresignedUrl(documentId: ID! @MongoId(key: "documentId"), key: String!, convertType: String): GetPresignedUrlForTemporaryDocumentPayload
  getPresignedUrlForMultipleDocumentImages(input: PresignedUrlForMultiImagesInput!): [PresignedUrlForImagePayload]
  refreshDocumentImageSignedUrls(documentId: ID! @MongoId(key: "documentId")): Object
  getSignedUrlForAnnotations(documentId: ID! @MongoId(key: "documentId")): String
  getFormField(documentId: ID! @MongoId(key: "documentId")): [FormField]
  getDocumentOutlines(input: GetDocumentOutlinesInput!): [GetDocumentOutlinesPayload]
  checkDownloadMultipleDocuments(input: CheckDownloadMultipleDocumentsInput!): CheckDownloadMultipleDocumentsPayload
  preCheckShareDocumentInSlack(input: PreCheckShareDocumentInSlackInput!): PreCheckShareDocumentInSlackResponse
  getSignedUrlForExternalPdfByEncodeData(encodeData: String!): GetSignedUrlForExternalPdfByEncodeDataPayload
  checkShareThirdPartyDocument(input: CheckShareThirdPartyDocumentInput!): CheckShareThirdPartyDocumentPayload
}

type Mutation {
  createDocuments(input: CreateDocumentsInput!): CreateDocumentsPayload
  deleteDocument(input: DeleteDocumentInput!): DeleteDocumentPayload
  renameDocument(input: RenameDocumentInput!): BasicResponseData
  updateThumbnail(input: UpdateThumbnailInput!): BasicResponse
  createDocumentPermission(input: CreateDocumentPermissionInput!): BasicResponse
  updateDocumentPermission(input: UpdateDocumentPermissionInput!): BasicResponse
  removeDocumentPermission(input: RemoveDocumentPermissionInput!): BasicResponse
  shareDocument(input: ShareDocumentInput!): BasicResponse
  updateBookmarks(input: UpdateBookmarksInput!): BasicResponse
