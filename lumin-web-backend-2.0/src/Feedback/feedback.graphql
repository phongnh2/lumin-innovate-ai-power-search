enum SatisfiedCategory {
  VeryDissatisfied
  Dissatisfied
  Neutral
  Satisfied
  VerySatisfied
}

enum ReasonTag {
  UnreliableStorage
  ConfusingUX
  NoDemand
  SpecificFeedback
}

input CreateShareDocFeedbackInput {
  satisfiedCategory: SatisfiedCategory
  reasonTag: ReasonTag
  specificFeedback: String @Length(min: 0, max: 2500)
}

input CreateFormDetectionFeedbackInput {
  score: Int! @Range(min: 1, max: 5)
  content: String @Length(min: 0, max: 2500)
}

input CreateMobileFeedbackInput {
  title: String! @Length(min: 0, max: 300)
  content: String! @Length(min: 0, max: 2500)
  imageURLs: [String]
}

type Mutation {
  createShareDocFeedback(input: CreateShareDocFeedbackInput!): BasicResponse
  createFormDetectionFeedback(input: CreateFormDetectionFeedbackInput!): BasicResponse
  createMobileFeedback(input: CreateMobileFeedbackInput!): BasicResponse
}
