# Queries and mutations for organization without org validation strategy
type Query {
  orgsOfUser: [OrganizationWithRole]
  checkMainOrgCreationAbility: CheckMainOrgCreationAbilityPayload
  getMainOrganizationCanJoin: OrganizationCanJoinPayload
  # Deprecated
  getMainOrganizationCanRequest: OrganizationRequestingPayload
  getTeamsOfTeamAdmin(orgId: ID! @MongoId(key: "orgId"), userId: ID! @MongoId(key: "userId")): [Team]
  getMembersOfTeam(teamId: ID !@MongoId(key: "teamId")): [Membership]
}

type Mutation {
  createOrganization(organization: CreateOrganizationInput!, file: Upload, disableEmail: Boolean): CreateOrganizationPayload
  requestJoinOrganization: RequestJoinOrganizationPayload
  joinOrganization(orgId: ID! @MongoId(key: "orgId")): JoinOrganizationPayload
  transferListTeamOwnership(input: TransferTeamsOwnershipInput!): TransferTeamsOwnershipPayload
  rejectJoinedOrgInvitation(input: RejectInvitationInput!): BasicResponse
  acceptInvitationOrganization(orgId: ID! @MongoId(key: "orgId")): AcceptInvitationPayload
  sendRequestJoinOrg(orgId: ID! @MongoId(key: "orgId")): RequestJoinOrganizationPayload
  requestSignSeat(input: RequestSignSeatInput!): BasicResponse
}

type Subscription {
  updateConvertedOrganization(orgIds: [String]!): Organization
}
