services:
  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      - MEILI_ENV=development
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  meili-init:
    build: .
    volumes:
      - ./data:/app/data
    environment:
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_INDEX=form
    depends_on:
      meilisearch:
        condition: service_healthy
    command: >
      sh -c "python scripts/import_forms.py && python scripts/setup_embedder.py"
    restart: "no"

