  <script src="https://apis.google.com/js/client.js" type="text/javascript"></script>
  <script type="text/javascript">
    const params = {
      cookie_policy: "single_host_origin",
      fetch_basic_profile: true,
      ux_mode: "popup",
      scope: "profile email https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.appdata",
      access_type: "online"
    };

    window.gapi.load("auth2", () => {
      if (!window.gapi.client.drive) {
        window.gapi.client.load("drive", "v3", () =>
          console.log("init drive success")
        );
      }
      if (!window.gapi.auth2.getAuthInstance()) {
        window.gapi.auth2.init(params).then(res => {
          console.log("init auth2 success");
        });
      }
    });

  </script>
