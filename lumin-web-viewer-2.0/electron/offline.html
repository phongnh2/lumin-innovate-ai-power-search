<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumin PDF - Offline</title>
    <style>
        :root {
            /* Kiwi Design System Tokens */
            --kiwi-colors-surface-surface-container-low: #f7f9fb;
            --kiwi-colors-surface-surface-bright: #ffffff;
            --kiwi-colors-surface-on-surface: #233f52;
            --kiwi-colors-surface-on-surface-variant: #48687f;
            --kiwi-colors-surface-outline-variant: #bccfdc;
            --kiwi-colors-core-primary: #035970;
            --kiwi-colors-core-on-primary: #ffffff;
            --kiwi-colors-core-primary-container: #d4f5ff;
            --kiwi-colors-core-on-primary-container: #003847;
            --kiwi-colors-core-primary-80: #4690a4;
            --kiwi-spacing-0-5: 4px;
            --kiwi-spacing-1: 8px;
            --kiwi-spacing-1-5: 12px;
            --kiwi-spacing-2: 16px;
            --kiwi-spacing-3: 24px;
            --kiwi-spacing-5: 40px;
            --kiwi-border-radius-sm: 4px;
            --kiwi-border-radius-md: 8px;
            --kiwi-border-radius-lg: 12px;
            --kiwi-border-radius-xl: 20px;
            --kiwi-opacity-state-layer-hovered: 0.08;
            --kiwi-opacity-state-layer-pressed: 0.12;
            --shadow-xs: 0 2px 4px -2px rgb(12 90 112 / 12%), 0 4px 8px -2px rgb(12 90 112 / 8%);
            --shadow-m: 0 6px 14px -6px rgb(12 90 112 / 12%), 0 10px 32px -4px rgb(12 90 112 / 10%);
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f1f5f8 0%, #e6f9ff 50%, #f4fcff 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--kiwi-colors-surface-on-surface);
        }
        
        .container {
            text-align: center;
            max-width: 400px;
            padding: var(--kiwi-spacing-5);
            background: var(--kiwi-colors-surface-surface-bright);
            border-radius: var(--kiwi-border-radius-xl);
            backdrop-filter: blur(10px);
            border: 1px solid var(--kiwi-colors-surface-outline-variant);
            box-shadow: var(--shadow-m);
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: var(--kiwi-spacing-2);
            background: linear-gradient(45deg, var(--kiwi-colors-core-primary), var(--kiwi-colors-core-primary-80));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: var(--kiwi-spacing-2);
            font-weight: 600;
            color: var(--kiwi-colors-core-on-primary-container);
        }
        
        p {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: var(--kiwi-spacing-3);
            color: var(--kiwi-colors-surface-on-surface-variant);
        }
        
        .retry-btn {
            background: var(--kiwi-colors-core-primary);
            border: none;
            color: var(--kiwi-colors-core-on-primary);
            padding: var(--kiwi-spacing-1-5) var(--kiwi-spacing-3);
            font-size: 16px;
            border-radius: var(--kiwi-border-radius-xl);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-xs);
            position: relative;
            overflow: hidden;
        }
        
        .retry-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--kiwi-colors-core-on-primary);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .retry-btn:hover::before {
            opacity: var(--kiwi-opacity-state-layer-hovered);
        }
        
        .retry-btn:active::before {
            opacity: var(--kiwi-opacity-state-layer-pressed);
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-m);
        }
        
        .status {
            margin-top: var(--kiwi-spacing-2);
            font-size: 14px;
            color: var(--kiwi-colors-surface-on-surface-variant);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Lumin</div>
        <h1>You're Offline</h1>
        <p>Lumin PDF requires an internet connection to work. Please check your connection and try again.</p>
        <button class="retry-btn" onclick="retry()">
            <span style="position: relative; z-index: 1;">Retry Connection</span>
        </button>
        <div class="status" id="status"></div>
    </div>

    <script>
        function retry() {
            const status = document.getElementById('status');
            status.textContent = 'Checking connection...';
            
            window.location.href = 'luminpdf://retry-connection';
        }

        setInterval(() => {
            if (navigator.onLine) {
                retry();
            }
        }, 30000);

        window.addEventListener('online', retry);
    </script>
</body>
</html>
